apiVersion: apps/v1
kind: Deployment
metadata:
  name: aegis-worker
  labels:
    app: aegis-worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: aegis-worker
  template:
    metadata:
      labels:
        app: aegis-worker
    spec:
      containers:
      - name: worker
        image: aegis-worker:latest
        env:
        - name: API_BASE_URL
          value: "http://aegis-api:3000"
        - name: POLL_INTERVAL_MS
          value: "15000"
        - name: NODE_ENV
          value: "production"
        - name: MAX_RETRIES
          value: "3"
        - name: RETRY_DELAY_MS
          value: "5000"
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "200m"
