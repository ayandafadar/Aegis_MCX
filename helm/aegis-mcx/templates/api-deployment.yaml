apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "aegis-mcx.fullname" . }}-api
  labels:
    {{- include "aegis-mcx.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  replicas: {{ .Values.replicaCount.api }}
  selector:
    matchLabels:
      {{- include "aegis-mcx.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: api
  template:
    metadata:
      labels:
        {{- include "aegis-mcx.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: api
    spec:
      containers:
      - name: api
        image: "{{ .Values.image.api.repository }}:{{ .Values.image.api.tag }}"
        imagePullPolicy: {{ .Values.image.api.pullPolicy }}
        ports:
        - name: http
          containerPort: 3000
          protocol: TCP
        env:
        {{- range $key, $value := .Values.env.api }}
        - name: {{ $key }}
          value: {{ $value | quote }}
        {{- end }}
        livenessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 10
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 5
          periodSeconds: 10
        resources:
          {{- toYaml .Values.resources.api | nindent 10 }}
        {{- if .Values.persistence.enabled }}
        volumeMounts:
        - name: runtime-storage
          mountPath: /app/backend/storage/runtime
        {{- end }}
      {{- if .Values.persistence.enabled }}
      volumes:
      - name: runtime-storage
        persistentVolumeClaim:
          claimName: {{ include "aegis-mcx.fullname" . }}-pvc
      {{- end }}
