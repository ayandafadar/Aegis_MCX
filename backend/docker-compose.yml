services:
  api:
    build:
      context: ..
      dockerfile: backend/apps/api/Dockerfile
    container_name: aegis-api
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      NODE_ENV: production
    volumes:
      - ./storage/runtime:/app/backend/storage/runtime
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/health', (r) => { process.exit(r.statusCode === 200 ? 0 : 1); })"]
      interval: 30s
      timeout: 3s
      start_period: 10s
      retries: 3

  worker:
    build:
      context: ..
      dockerfile: backend/apps/worker/Dockerfile
    container_name: aegis-worker
    depends_on:
      api:
        condition: service_healthy
    environment:
      API_BASE_URL: http://api:3000
      POLL_INTERVAL_MS: 15000
      NODE_ENV: production
    restart: unless-stopped
