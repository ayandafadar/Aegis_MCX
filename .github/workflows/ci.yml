name: ci

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Type-check workspaces
        working-directory: backend
        run: npm run typecheck

      - name: Start API
        working-directory: backend
        run: |
          npm run start > api.log 2>&1 &
          echo $! > api.pid

      - name: Wait for API readiness
        working-directory: backend
        run: |
          for attempt in {1..30}; do
            if curl --fail --silent http://127.0.0.1:3000/health > /dev/null; then
              exit 0
            fi
            sleep 2
          done
          cat api.log
          exit 1

      - name: Run integration tests
        working-directory: backend
        run: ./scripts/integration-test.sh

      - name: Validate Docker image builds
        run: |
          docker build -f backend/apps/api/Dockerfile -t aegis-api-ci .
          docker build -f backend/apps/worker/Dockerfile -t aegis-worker-ci .

      - name: Recompute correlation snapshot
        run: curl --fail --silent -X POST http://127.0.0.1:3000/api/correlation/recompute > /tmp/correlation.json

      - name: Verify dashboard page renders
        run: |
          curl --fail --silent http://127.0.0.1:3000/dashboard > /tmp/dashboard.html


      - name: Upload API log
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: api-log
          path: backend/api.log


      - name: Stop API
        if: always()
        working-directory: backend
        run: |
          if [[ -f api.pid ]]; then
            kill "$(cat api.pid)" || true
          fi

  deploy:
    needs: verify
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push API Image
        run: |
          docker build -f backend/apps/api/Dockerfile -t ayandafadar/aegis-api:latest .
          docker push ayandafadar/aegis-api:latest

      - name: Build and Push Worker Image
        run: |
          docker build -f backend/apps/worker/Dockerfile -t ayandafadar/aegis-worker:latest .
          docker push ayandafadar/aegis-worker:latest
