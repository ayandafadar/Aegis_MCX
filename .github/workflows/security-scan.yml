name: security-scan

on:
  push:
    branches:
      - main
  pull_request:
  schedule:
    - cron: '0 0 * * 0'

permissions:
  contents: read
  security-events: write

jobs:
  dependency-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 20

      - name: Install dependencies
        working-directory: backend
        run: npm ci

      - name: Run npm audit
        working-directory: backend
        run: npm audit --audit-level=moderate

  docker-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Build API image
        run: docker build -f backend/apps/api/Dockerfile -t aegis-api:scan .

      - name: Build worker image
        run: docker build -f backend/apps/worker/Dockerfile -t aegis-worker:scan .

      - name: Run Trivy scan on API
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # master
        with:
          image-ref: aegis-api:scan
          format: 'sarif'
          output: 'trivy-api-results.sarif'

      - name: Run Trivy scan on worker
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # master
        with:
          image-ref: aegis-worker:scan
          format: 'sarif'
          output: 'trivy-worker-results.sarif'

      - name: Upload Trivy results
        uses: github/codeql-action/upload-sarif@480db559a14342288b67e54bd959dd52dc3ee68f # v3
        if: always()
        with:
          sarif_file: 'trivy-api-results.sarif'
