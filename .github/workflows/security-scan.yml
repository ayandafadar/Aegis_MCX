name: security-scan

on:
  push:
    branches:
      - main
  pull_request:
  schedule:
    - cron: '0 0 * * 0'

jobs:
  dependency-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        working-directory: backend
        run: npm ci

      - name: Run npm audit
        working-directory: backend
        run: npm audit --audit-level=moderate

  docker-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build API image
        run: docker build -f backend/apps/api/Dockerfile -t aegis-api:scan .

      - name: Build worker image
        run: docker build -f backend/apps/worker/Dockerfile -t aegis-worker:scan .

      - name: Run Trivy scan on API
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: aegis-api:scan
          format: 'sarif'
          output: 'trivy-api-results.sarif'

      - name: Run Trivy scan on worker
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: aegis-worker:scan
          format: 'sarif'
          output: 'trivy-worker-results.sarif'

      - name: Upload Trivy results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-api-results.sarif'
