<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Aegis MCX — DevOps Platform</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="app.css"/>
</head>
<body>
<div id="app">
  <aside id="sidebar">
    <div class="brand">
      <div class="brand-logo">A</div>
      <div>
        <div class="brand-name">Aegis MCX</div>
        <div class="brand-sub">DevOps Platform</div>
      </div>
    </div>
    <nav>
      <button class="nav-item active" data-page="overview">
        <span class="nav-icon">&#9632;</span> Overview
      </button>
      <button class="nav-item" data-page="market">
        <span class="nav-icon">&#9650;</span> Market Watch
      </button>
      <button class="nav-item" data-page="margins">
        <span class="nav-icon">&#9670;</span> Daily Margins
      </button>
      <button class="nav-item" data-page="alerts">
        <span class="nav-icon">&#9888;</span> Alerts
      </button>
      <button class="nav-item" data-page="correlation">
        <span class="nav-icon">&#9881;</span> Correlation
      </button>
      <button class="nav-item" data-page="cicd">
        <span class="nav-icon">&#9654;</span> CI/CD Pipeline
      </button>
      <button class="nav-item" data-page="infra">
        <span class="nav-icon">&#9729;</span> Infrastructure
      </button>
    </nav>
    <div class="sidebar-footer">
      <div class="worker-status" id="sidebarWorker">
        <span class="status-dot idle"></span>
        <span>Worker: idle</span>
      </div>
    </div>
  </aside>

  <main id="content">
    <header id="topbar">
      <div class="topbar-left">
        <h1 id="pageTitle">Overview</h1>
        <span id="lastUpdated" class="last-updated">–</span>
      </div>
      <div class="topbar-right">
        <div class="live-badge"><span class="live-dot"></span>Live</div>
        <button class="btn-refresh" id="refreshBtn" onclick="refresh(true)">&#8635; Refresh</button>
      </div>
    </header>

    <div id="page-overview" class="page active"></div>
    <div id="page-market" class="page"></div>
    <div id="page-margins" class="page"></div>
    <div id="page-alerts" class="page"></div>
    <div id="page-correlation" class="page"></div>
    <div id="page-cicd" class="page"></div>
    <div id="page-infra" class="page"></div>
  </main>
</div>
<script src="app.js"></script>
</body>
</html>
